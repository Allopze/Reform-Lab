x-runtime-env: &runtime-env
  APP_ENV: "${APP_ENV:-production}"
  DATABASE_PATH: "/data/reform.db"
  MIGRATIONS_PATH: "/app/migrations"
  STORAGE_BASE_PATH: "/data"
  REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
  LOG_LEVEL: "${LOG_LEVEL:-info}"
  JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set to a strong value}"
  SECRET_ENCRYPTION_KEY: "${SECRET_ENCRYPTION_KEY:-}"
  APP_URL: "${APP_URL:-http://localhost:${WEB_HOST_PORT:-5050}}"
  BOOTSTRAP_ADMIN_EMAILS: "${BOOTSTRAP_ADMIN_EMAILS:-}"
  REQUIRE_VERIFIED_EMAIL_FOR_SENSITIVE_ACTIONS: "${REQUIRE_VERIFIED_EMAIL_FOR_SENSITIVE_ACTIONS:-false}"
  ORIGINAL_RETENTION_HOURS: "${ORIGINAL_RETENTION_HOURS:-24}"
  TEMP_RETENTION_HOURS: "${TEMP_RETENTION_HOURS:-6}"
  ARTIFACT_TTL_HOURS: "${ARTIFACT_TTL_HOURS:-24}"
  ARTIFACT_TTL_HOURS_PDF: "${ARTIFACT_TTL_HOURS_PDF:-48}"
  ARTIFACT_TTL_HOURS_IMAGE: "${ARTIFACT_TTL_HOURS_IMAGE:-12}"
  ARTIFACT_TTL_HOURS_DOCUMENT: "${ARTIFACT_TTL_HOURS_DOCUMENT:-24}"
  ARTIFACT_TTL_HOURS_AUDIO: "${ARTIFACT_TTL_HOURS_AUDIO:-72}"
  ARTIFACT_TTL_HOURS_VIDEO: "${ARTIFACT_TTL_HOURS_VIDEO:-96}"
  FEATURE_DISABLE_CAPABILITIES: "${FEATURE_DISABLE_CAPABILITIES:-}"
  FEATURE_DISABLE_ENGINES: "${FEATURE_DISABLE_ENGINES:-}"
  SMTP_HOST: "${SMTP_HOST:-}"
  SMTP_PORT: "${SMTP_PORT:-587}"
  SMTP_USER: "${SMTP_USER:-}"
  SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
  SMTP_FROM: "${SMTP_FROM:-noreply@example.com}"
  SMTP_USE_TLS: "${SMTP_USE_TLS:-true}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"

services:
  web:
    image: reform-lab-web:local
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must point to the public API URL}"
        NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
        NEXT_PUBLIC_SENTRY_DSN: "${NEXT_PUBLIC_SENTRY_DSN:-}"
        INTERNAL_API_URL: "${INTERNAL_API_URL:-http://api:8080}"
        SENTRY_ORG: "${SENTRY_ORG:-}"
        SENTRY_PROJECT: "${SENTRY_PROJECT:-}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_BIND_ADDRESS:-127.0.0.1}:${WEB_HOST_PORT:-5050}:5050"
    environment:
      PORT: "5050"
      HOSTNAME: "0.0.0.0"
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET must be set to a strong value}"
      APP_URL: "${APP_URL:-http://localhost:${WEB_HOST_PORT:-5050}}"
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must point to the public API URL}"
      NEXT_PUBLIC_APP_URL: "${NEXT_PUBLIC_APP_URL:-}"
    networks:
      - public

  redis:
    image: redis:7-alpine
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "noeviction",
      ]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - ./runtime/redis:/data
    pids_limit: 128
    mem_limit: "${REDIS_MEMORY_LIMIT:-512m}"
    networks:
      - worker_internal

  api:
    image: reform-lab-api:local
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    depends_on:
      data-permissions:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${API_BIND_ADDRESS:-127.0.0.1}:${API_HOST_PORT:-8080}:8080"
    environment:
      <<: *runtime-env
      PORT: "8080"
      CORS_ORIGIN: "${CORS_ORIGIN:?CORS_ORIGIN must match the public web origin}"
      EXPOSE_METRICS: "${EXPOSE_METRICS:-false}"
      METRICS_TOKEN: "${METRICS_TOKEN:-}"
      TRUST_PROXY_HEADERS: "${TRUST_PROXY_HEADERS:-true}"
      IN_PROCESS_WORKER_CONCURRENCY: "0"
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
      USER_UPLOADS_PER_MINUTE: "${USER_UPLOADS_PER_MINUTE:-12}"
      USER_UPLOAD_BURST: "${USER_UPLOAD_BURST:-4}"
      USER_CONVERSIONS_PER_MINUTE: "${USER_CONVERSIONS_PER_MINUTE:-6}"
      USER_CONVERSION_BURST: "${USER_CONVERSION_BURST:-3}"
      MAX_ACTIVE_JOBS_PER_USER: "${MAX_ACTIVE_JOBS_PER_USER:-3}"
      MAX_ACTIVE_JOBS_PER_GUEST_SESSION: "${MAX_ACTIVE_JOBS_PER_GUEST_SESSION:-1}"
      GUEST_CUMULATIVE_QUOTA_BYTES: "${GUEST_CUMULATIVE_QUOTA_BYTES:-26214400}"
      REGISTERED_CUMULATIVE_QUOTA_BYTES: "${REGISTERED_CUMULATIVE_QUOTA_BYTES:-524288000}"
    volumes:
      - ./runtime/data:/data
    read_only: true
    tmpfs:
      - /tmp:size=268435456,mode=1777
      - /run:size=16777216,mode=755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s
    pids_limit: 256
    mem_limit: "${API_MEMORY_LIMIT:-1024m}"
    cpus: "${API_CPUS:-1.00}"
    networks:
      - public
      - worker_internal

  worker:
    image: reform-lab-worker:local
    build:
      context: ./apps/api
      dockerfile: Dockerfile.worker
    init: true
    restart: unless-stopped
    depends_on:
      data-permissions:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      <<: *runtime-env
      WORKER_CONCURRENCY: "${WORKER_CONCURRENCY:-2}"
    volumes:
      - ./runtime/data:/data
    read_only: true
    tmpfs:
      - /tmp:size=536870912,mode=1777
      - /run:size=16777216,mode=755
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: "${WORKER_MEMORY_LIMIT:-2048m}"
    cpus: "${WORKER_CPUS:-2.00}"
    networks:
      - worker_internal

  data-permissions:
    image: reform-lab-api:local
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    user: "0:0"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mkdir -p /data /data/originals /data/artifacts /data/temp /data/backups
        if chown -R 10001:10001 /data 2>/tmp/chown.err; then
          exit 0
        fi
        echo "data-permissions: WARN: chown failed; checking writability for uid/gid 10001" >&2
        (cat /tmp/chown.err >&2) || true
        check_writable() {
          path="$$1"
          uid="$$(stat -c '%u' "$$path")"
          gid="$$(stat -c '%g' "$$path")"
          perm="$$(stat -c '%a' "$$path")"
          perm="$$(printf '%04d' "$$perm")"
          perm="$${perm#?}"
          owner="$${perm%??}"
          rest="$${perm#?}"
          group="$${rest%?}"
          other="$${perm#??}"
          can_write_digit() {
            case "$$1" in
              2|3|6|7) return 0 ;;
              *) return 1 ;;
            esac
          }
          if [ "$$uid" = "10001" ] && can_write_digit "$$owner"; then return 0; fi
          if [ "$$gid" = "10001" ] && can_write_digit "$$group"; then return 0; fi
          if can_write_digit "$$other"; then return 0; fi
          echo "data-permissions: ERROR: $$path not writable for uid/gid 10001 (uid=$$uid gid=$$gid perm=$$perm)" >&2
          return 1
        }
        ok="1"
        for d in /data /data/originals /data/artifacts /data/temp /data/backups; do
          check_writable "$$d" || ok="0"
        done
        if [ "$$ok" = "1" ]; then
          echo "data-permissions: proceeding despite chown failure (paths writable)" >&2
          exit 0
        fi
        echo "data-permissions: Fix on host (bind mount): sudo chown -R 10001:10001 ./runtime/data" >&2
        exit 1
    restart: "no"
    volumes:
      - ./runtime/data:/data
    networks:
      - worker_internal

networks:
  public:
  worker_internal:
    internal: true
