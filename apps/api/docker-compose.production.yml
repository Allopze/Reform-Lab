# docker-compose.production.yml
#
# API-only production overlay for backend smoke and development parity.
# Server deployments should use the root docker-compose.yml instead.
# This overlay activates the Redis profile so the API and worker run as
# separate containers. config.go enforces REDIS_URL in production.
#
# Usage:
#   docker compose --profile redis -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  api:
    environment:
      APP_ENV: "production"
      REDIS_URL: "redis://redis:6379"
      EXPOSE_METRICS: "${EXPOSE_METRICS:-false}"
      METRICS_TOKEN: "${METRICS_TOKEN:-}"
      TRUST_PROXY_HEADERS: "true"
      IN_PROCESS_WORKER_CONCURRENCY: "0"
    networks:
      - public
      - worker_internal

  worker:
    environment:
      APP_ENV: "production"
