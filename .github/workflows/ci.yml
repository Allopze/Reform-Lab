name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Go vulnerability check
        run: $(go env GOPATH)/bin/govulncheck ./...

      - name: Build server
        run: go build -o /dev/null ./cmd/server

      - name: Build worker
        run: go build -o /dev/null ./cmd/worker

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Dependency audit
        run: npm audit --omit=dev --audit-level=moderate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright tests
        run: npm run test:e2e
        env:
          JWT_SECRET: test-strong-jwt-secret-for-playwright-1234567890
          NEXT_PUBLIC_API_URL: http://127.0.0.1:5070

  docker:
    name: Docker compose
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      WEB_BIND_ADDRESS: 127.0.0.1
      API_BIND_ADDRESS: 127.0.0.1
      WEB_HOST_PORT: 5050
      API_HOST_PORT: 8080
      APP_ENV: production
      CORS_ORIGIN: http://127.0.0.1:5050
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8080
      APP_URL: http://127.0.0.1:5050
      JWT_SECRET: test-strong-jwt-secret-for-docker-ci-1234567890
      SECRET_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
      REDIS_URL: redis://redis:6379
      TRUST_PROXY_HEADERS: "false"
      REQUIRE_VERIFIED_EMAIL_FOR_SENSITIVE_ACTIONS: "false"

    steps:
      - uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t reform-api:ci apps/api

      - name: Build Worker image
        run: docker build -f apps/api/Dockerfile.worker -t reform-worker:ci apps/api

      - name: Compose up with clean runtime
        run: |
          rm -rf runtime
          docker compose up -d --build
          curl --fail --retry 20 --retry-delay 3 http://127.0.0.1:8080/api/health

      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Compose down
        if: always()
        run: docker compose down -v --remove-orphans

      - name: Scan API image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: reform-api:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: reform-worker:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
