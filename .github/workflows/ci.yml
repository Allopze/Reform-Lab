name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Install dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build server
        run: go build -o /dev/null ./cmd/server

      - name: Build worker
        run: go build -o /dev/null ./cmd/worker

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t reform-api:ci apps/api

      - name: Build Worker image
        run: docker build -f apps/api/Dockerfile.worker -t reform-worker:ci apps/api

      - name: Scan API image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: reform-api:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: reform-worker:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
